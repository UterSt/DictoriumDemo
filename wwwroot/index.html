<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dictorium Demo</title>
    <!--
        base href is "/" for local development.
        The deploy.yml workflow replaces this with "/<REPO_NAME>/" for GitHub Pages.
        DO NOT change this manually for GitHub Pages — edit deploy.yml instead.
    -->
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/demo-additions.css" />
</head>

<body>
    <div id="app">
        <div style="padding:60px;text-align:center;font-family:Verdana,sans-serif;font-size:13px;color:#333;">
            Загрузка Dictorium Demo...
        </div>
    </div>

    <div id="blazor-error-ui"
         style="display:none;position:fixed;bottom:0;left:0;right:0;
                background:#fff0f0;border-top:2px solid #cc0000;
                padding:8px 16px;font-family:Verdana,sans-serif;font-size:12px;">
        Ошибка Blazor. <a href="" style="color:#cc0000;">Перезагрузить</a>
        <button onclick="document.getElementById('blazor-error-ui').style.display='none'"
                style="float:right;background:none;border:none;cursor:pointer;color:#cc0000;">&#10005;</button>
    </div>

    <!--
        Dictorium WebAssembly module (compiled from C++ via Emscripten).
        Loads dictorium.wasm relative to its own script URL — works correctly
        on both localhost and GitHub Pages regardless of base href.
    -->
    <script src="js/dictorium.js"></script>

    <!-- Blazor JSInterop bridge to DictoriumModule -->
    <script src="js/dictorium-interop.js"></script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
